version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: acadclarifier_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-acadclarifier}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acadclarifier_network
    restart: unless-stopped

  # Flask Backend API + Static Frontend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acadclarifier_backend
    environment:
      # Database Configuration
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-acadclarifier}

      # Application Configuration
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: wsgi:app

      # Paths (adjust based on your setup)
      BOOK_RECOMMENDER_CHROMA_PATH: /app/services/book-recommender/chroma_data

      # Port Configuration
      PORT: 5000
      FRONTEND_PORT: 8501

      # Additional environment variables from .env file
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

    ports:
      # Backend API
      - '${BACKEND_PORT:-5000}:5000'
      # Frontend Static Server (optional)
      - '${FRONTEND_PORT:-8501}:8501'

    volumes:
      # Mount ChromaDB data for persistence
      - chroma_data:/app/services/book-recommender/chroma_data
      # Mount outputs for debugging
      - ./services/retrieval-local/outputs:/app/services/retrieval-local/outputs
      - ./services/retrieval-web/outputs:/app/services/retrieval-web/outputs

    depends_on:
      db:
        condition: service_healthy

    networks:
      - acadclarifier_network

    restart: unless-stopped

    # Optional: Add logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local

networks:
  acadclarifier_network:
    driver: bridge
